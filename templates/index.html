<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Skill Gap Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Resume Skill Gap Analyzer</h1>
        <p>Upload your resume and find out which skills you're missing for your target role.</p>

        <div class="form-group">
            <label>Upload Resume (PDF only)</label>
            <input type="file" id="resume-input" accept=".pdf">
        </div>

        <div class="form-group">
            <label>Select Target Role</label>
            <select id="role-select">
                <option value="">-- Choose a role --</option>
                <option value="Data Analyst">Data Analyst</option>
                <option value="Software Engineer">Software Engineer</option>
                <option value="ML Engineer">ML Engineer</option>
            </select>
        </div>

        <button id="analyze-btn">Analyze Resume</button>

        <div id="result" class="hidden">
            <div class="score-box">
                <h2 id="percentage"></h2>
                <p id="role-label"></p>
            </div>

            <div class="skills-grid">
                <div class="skills-col">
                    <h3>✅ Skills You Have</h3>
                    <ul id="found-list"></ul>
                </div>
                <div class="skills-col">
                    <h3>❌ Skills You're Missing</h3>
                    <ul id="missing-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
